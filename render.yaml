services:
  - type: web
    name: restaurant-incident-backend
    env: node
    plan: free
    rootDir: .
    # Build frontend and backend without relying on npm workspaces flags, which
    # may not be available in the platform's npm version. This runs separate
    # installs and builds in each subfolder so artifacts persist into the runtime.
    buildCommand: |
      set -e
      cd frontend
      npm ci
      npm run build
      cd ../backend
      npm ci
      npm run build
      cd ..
    startCommand: npm run start -w backend
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOW_OFFLINE_START
        value: "false"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DIRECT_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DELETE_WINDOW_MINUTES
        value: "60"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_URL
        value: https://generativelanguage.googleapis.com/v1beta
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
